title: Sobre Mim
description: Saiba mais sobre meu foco prático com IA, metodologias ágeis e arquitetura de jornadas incríveis que trazem lucro às empresas.
content: |
  Olá, sou **Gabriel Pimenta**, líder movido por curiosidade e pela vontade de solucionar gargalos usando a Inteligência Artificial e o bom desenvolvimento. Nos últimos anos decidi aplicar meu senso analítico ajudando negócios a melhorarem seus atendimentos, modernizando CRMs ou qualificando leads online automatizados – e os ensinando e venderem muito mais!

  Fundei a **ElevenIA**, onde modelamos e criamos ecossistemas em Automação via inteligências artificiais com a convicção de que ela tem que ser prática para negócios palpáveis. E também ajudei a forjar o **Flux CRM**, uma baita plataforma omnichannel na qual tornamos a conectividade útil às estratégias customizadas de cada equipe de pré-vendas. Indo além do software, orquestro frentes de **Marketing Digital** para clientes gerenciando campanhas de tráfego pago ponta-a-ponta, englobando Google Ads, Facebook Ads e estratégias avançadas de Growth.

  ### Experiência de Linha de Frente

  Coordenação, desenvolvimento base e estratégias em mesas diretivas (*C-Levels*, MINAS BANK) me capacitaram como *Agilista* experiente. Domino gestão veloz em empresas para escalar projetos estagnados. Acredito que inovação real é tão somente aquilo que soluciona dores humanas sem gerar atrito para você ou o seu liderado.

  ### A base do Design

  No topo dessa gestão eu agrego muito no setor de software, desde Web Development robusto até arquitetura de banco de dados e UX limpa.

  ### Vamos criar laços de parceria?

  Busco conversas sinceras e networking aberto sobre liderança e inovação contínua. Mande o alô na caixa de mensagens! Fique pelas seções de [Projetos](/projects) ou dê um mergulho no painel dos cases.
