faq:
  title: Especialidades & Serviços
  description: Conheça as principais frentes em que atuo e como posso ajudar sua empresa a escalar de forma automática.
  categories:
    - title: "Inovação Digital"
      questions:
        - label: O que entregamos?
          content: |
            Transformamos ideias em soluções digitais inovadoras que impulsionam o crescimento. O processo passa por Ideação, Prototipagem, Testes e Implementação.
        - label: Principais Recursos
          content: |
            Nossos pilares incluem Pesquisa & Desenvolvimento, focar em Tecnologias Emergentes, desenhar Soluções Personalizadas e definir uma sólida Estratégia Digital.
    - title: "Consultoria Estratégica"
      questions:
        - label: Como abordamos o negócio?
          content: |
            Orientamos empresas na transformação digital e otimização de processos através de um fluxo focado em Análise, Estratégia, Planejamento e Execução assertiva.
        - label: Nossos Recursos
          content: |
            Apoio completo com Análise de Negócios, Planejamento Estratégico, Otimização constante de Processos e Mentoria Técnica para guiar o time interno.
    - title: "Inteligência Artificial & Labs"
      questions:
        - label: Qual a atuação da Inteligência Artificial?
          content: |
            Desenvolvemos soluções de IA práticas que automatizam processos e geram insights valiosos na cadeia de atendimento. Realizamos Coleta de Dados, Treinamento de Modelo, Validação e Implantação direta usando Machine Learning, Processamento de Linguagem e Automação Inteligente.
        - label: O que é o Innovation Labs?
          content: |
            Um laboratório onde experimentamos com tecnologias de ponta para criar o futuro da inovação digital. Envolve Pesquisa Experimental, Prototipagem Avançada e Inovação Colaborativa.
    - title: "Ads & Tráfego Pago"
      questions:
        - label: O que entregamos em tráfego?
          content: |
            Crio e gerencio campanhas de tráfego pago altamente focadas em conversão no Google Ads e Meta Ads (Facebook e Instagram), desenhando funis de ponta a ponta.
        - label: Estratégias Digitais
          content: |
            Desde a configuração do pixel e estruturação da campanha de aquisição até o remarketing, unindo dados de IA para extrair leads qualificados reduzindo seu custo por clique.
    - title: "Desenvolvimento Web & Sites"
      questions:
        - label: Criação de Landing Pages e Sites?
          content: |
            Desenvolvimento de sites institucionais e landing pages de altíssima performance, otimizados para conversão e ranqueamento no Google (SEO), utilizando tecnologias modernas como Nuxt.js e Vue.
        - label: UX/UI Design
          content: |
            Design focado na experiência do usuário, garantindo uma navegação fluida, acessível e responsiva em dispositivos móveis e desktops para reter o cliente na sua página.
